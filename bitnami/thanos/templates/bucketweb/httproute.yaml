{{- if and .Values.bucketweb.enabled .Values.bucketweb.httpRoute.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ template "thanos.bucketweb.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  {{- $labels := include "common.tplvalues.merge" (dict "values" ( list .Values.bucketweb.httpRoute.labels .Values.commonLabels ) "context" . ) }}
  labels: {{- include "common.labels.standard" (dict "customLabels" $labels "context" .) | nindent 4 }}
    app.kubernetes.io/component: bucketweb
  {{- if or .Values.bucketweb.httpRoute.annotations .Values.commonAnnotations }}
  {{- $annotations := include "common.tplvalues.merge" (dict "values" ( list .Values.bucketweb.httpRoute.annotations .Values.commonAnnotations ) "context" . ) }}
  annotations: {{- include "common.tplvalues.render" (dict "value" $annotations "context" .) | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
  {{- if .Values.bucketweb.httpRoute.parentRefs }}
    {{- include "common.tplvalues.render" (dict "value" .Values.bucketweb.httpRoute.parentRefs "context" .) | nindent 4 }}
  {{- else }}
    - name: gateway
      namespace: {{ include "common.names.namespace" . | quote }}
  {{- end }}
  hostnames: {{- include "common.tplvalues.render" (dict "value" .Values.bucketweb.httpRoute.hostnames "context" .) | nindent 4 }}
  rules:
    - backendRefs:
        - name: {{ include "thanos.bucketweb.fullname" . }}
          port: {{ .Values.bucketweb.service.ports.http }}
          weight: 1
      {{- if .Values.bucketweb.httpRoute.matches }}
      matches: {{- include "common.tplvalues.render" (dict "value" .Values.bucketweb.httpRoute.matches "context" .) | nindent 8 }}
      {{- end }}
      {{- if .Values.bucketweb.httpRoute.filters }}
      filters: {{- include "common.tplvalues.render" (dict "value" .Values.bucketweb.httpRoute.filters "context" .) | nindent 8 }}
      {{- end }}
      {{- if .Values.bucketweb.httpRoute.timeouts }}
      timeouts: {{- include "common.tplvalues.render" (dict "value" .Values.bucketweb.httpRoute.timeouts "context" .) | nindent 8 }}
      {{- end }}
  {{- if .Values.bucketweb.httpRoute.extraRules }}
    {{- include "common.tplvalues.render" (dict "value" .Values.bucketweb.httpRoute.extraRules "context" .) | nindent 4 }}
  {{- end }}
{{- end }}