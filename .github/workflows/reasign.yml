# NOTE: This workflow is maintained in the https://github.com/bitnami/support repository
name: '[Support] Review based card movements'
on:
  # pull_request_target: required so secrets: inherit reaches bitnami/support; no PR checkout here.
  pull_request_target:
    types:
      - labeled
  issues:
    types:
      - labeled
permissions:
  contents: read
  pull-requests: write
  issues: write
# Avoid concurrency over the same issue
concurrency:
  group: card-movement-${{ github.event.issue != null && github.event.issue.number || github.event.number }}
jobs:
  call-reasign-workflow:
    if: ${{ github.repository_owner == 'bitnami' }}
    uses: bitnami/support/.github/workflows/item-labeled.yml@96bc169b45aa483cf2bafaaee9dae80eabd96cac
    secrets: inherit